<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/app_logo.png" />
    <link rel="apple-touch-icon" href="/app_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>
      TechItik - Interactive Learning Platform for Teachers & Students
    </title>
    <meta
      name="title"
      content="TechItik - Interactive Learning Platform for Teachers & Students"
    />
    <meta
      name="description"
      content="Create engaging quizzes, manage classrooms, and track student progress with TechItik. The modern learning management platform for educators and students."
    />
    <meta
      name="keywords"
      content="online learning, quiz platform, classroom management, education technology, student assessment, teacher tools, e-learning, LMS"
    />
    <meta name="author" content="TechItik" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://techitik.com" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://techitik.com" />
    <meta
      property="og:title"
      content="TechItik - Interactive Learning Platform"
    />
    <meta
      property="og:description"
      content="Create engaging quizzes, manage classrooms, and track student progress with TechItik."
    />
    <meta property="og:image" content="https://techitik.com/app_logo.png" />
    <meta property="og:site_name" content="TechItik" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://techitik.com" />
    <meta
      property="twitter:title"
      content="TechItik - Interactive Learning Platform"
    />
    <meta
      property="twitter:description"
      content="Create engaging quizzes, manage classrooms, and track student progress with TechItik."
    />
    <meta
      property="twitter:image"
      content="https://techitik.com/app_logo.png"
    />

    <!-- Additional Meta Tags -->
    <meta name="theme-color" content="#51b484" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="format-detection" content="telephone=no" />

    <!-- Preconnect / DNS prefetch -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.googleapis.com" />
    <link rel="dns-prefetch" href="https://accounts.google.com" />

    <!-- Preload critical assets -->
    <link rel="preload" as="image" href="/bg.webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/app_logo.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "TechItik",
        "description": "Interactive learning platform for teachers and students",
        "url": "https://techitik.com",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Web Browser",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.8",
          "ratingCount": "1250"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
